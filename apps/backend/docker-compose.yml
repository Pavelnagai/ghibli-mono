version: '3.8'

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: tests-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis-test:
    image: redis:latest
    container_name: tests-redis
    ports:
      - '${REDIS_PORT}:6379'
    restart: unless-stopped

  minio-test:
    image: minio/minio
    container_name: tests-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    ports:
      - '${MINIO_PORT}:9000' # API
      - '${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}' # Console
    volumes:
      - minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:${MINIO_PORT}/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres-data:
  minio-data:
